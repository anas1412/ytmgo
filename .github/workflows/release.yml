name: release

# Build static binaries for 4 OS/arch combos and attach them to a
# GitHub Release whenever you push a tag like `v0.2.0`.
# Also publishes the updated PKGBUILD to the Arch User Repository (AUR).
#
# Asset naming follows the convention expected by install.sh:
#   ytmgo_Linux_x86_64.tar.gz
#   ytmgo_Linux_arm64.tar.gz
#   ytmgo_Darwin_x86_64.tar.gz
#   ytmgo_Darwin_arm64.tar.gz
# Each tarball contains a single `ytmgo` binary + a `ytmgo_<asset>.sha256`
# sidecar so install.sh can verify the download.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # required to create / upload release assets

# Don't pile up concurrent release jobs for the same tag
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x86_64
            goarch: amd64
            asset_os: Linux   # capitalized to match install.sh's `uname -s`
          - os: linux
            arch: arm64
            goarch: arm64
            asset_os: Linux
          - os: darwin
            arch: x86_64
            goarch: amd64
            asset_os: Darwin
          - os: darwin
            arch: arm64
            goarch: arm64
            asset_os: Darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build static binary
        env:
          # Version metadata — baked into the binary at link time.
          # github.ref_name is the tag name (e.g. "v0.1.1") on tag pushes.
          VERSION:    ${{ github.ref_name }}
          COMMIT:     ${{ github.sha }}
          BUILD_DATE: ${{ github.event.repository.updated_at }}
          GOOS:       ${{ matrix.os == 'darwin' && 'darwin' || 'linux' }}
          GOARCH:     ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          go build \
            -trimpath \
            -ldflags="-s -w \
              -X 'ytmgo/internal/version.Version=$VERSION' \
              -X 'ytmgo/internal/version.Commit=${COMMIT:0:7}' \
              -X 'ytmgo/internal/version.BuildDate=$BUILD_DATE'" \
            -o "ytmgo" \
            .

      - name: Package + checksum
        run: |
          set -euo pipefail
          asset="ytmgo_${{ matrix.asset_os }}_${{ matrix.arch }}.tar.gz"
          tar -czf "$asset" ytmgo
          sha256sum "$asset" | tee "${asset}.sha256"
          ls -la "$asset" "${asset}.sha256"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ytmgo_${{ matrix.asset_os }}_${{ matrix.arch }}.tar.gz
            ytmgo_${{ matrix.asset_os }}_${{ matrix.arch }}.tar.gz.sha256

  # ───────────────────────────────────────────────────────────────────
  # Publish to Arch User Repository
  # ───────────────────────────────────────────────────────────────────
  aur:
    name: publish to AUR
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate PKGBUILD + .SRCINFO
        run: |
          bash dist/arch/generate-pkgbuild.sh "${{ github.ref_name }}" --out /tmp/aur-pkg

      - name: Push to AUR
        env:
          AUR_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          # Write SSH key
          mkdir -p ~/.ssh
          echo "$AUR_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur

          # Add AUR host key
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null

          # Use the key for AUR
          cat >> ~/.ssh/config << 'CONFIG'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
          CONFIG

          # Verify SSH works
          echo ">>> Testing SSH connection..."
          ssh -T aur@aur.archlinux.org 2>&1 || true

          # Configure git
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone AUR repo
          echo ">>> Cloning AUR repo..."
          git clone ssh://aur@aur.archlinux.org/ytmgo.git /tmp/aur-repo
          cd /tmp/aur-repo

          # Update files
          cp /tmp/aur-pkg/PKGBUILD .
          cp /tmp/aur-pkg/.SRCINFO .

          # Commit and push
          git add PKGBUILD .SRCINFO
          if ! git diff --cached --quiet; then
            git commit -m "Update to ${{ github.ref_name }}"
            echo ">>> Pushing to AUR..."
            git push origin master
            echo "✓ AUR updated to ${{ github.ref_name }}"
          else
            echo "No changes — AUR already up to date."
          fi
